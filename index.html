<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>no-ai-search</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<main class="home">

  <div class="logo">search<span>.</span></div>

  <div class="engine-row" id="engineRow">
    <button class="engine-btn active" data-engine="google">Google</button>
    <button class="engine-btn" data-engine="ddg">DuckDuckGo</button>
    <button class="engine-btn" data-engine="brave">Brave</button>
    <button class="engine-btn" data-engine="kagi">Kagi</button>
  </div>

  <div class="search-wrap">
    <div class="input-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="q"
        type="text"
        placeholder="Search or use !bang shortcuts..."
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
      <button class="clear-icon" id="clearBtn" aria-label="Clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="searchBtn">Search</button>
      <button class="btn" id="imagesBtn">Images</button>
      <button class="btn" id="newsBtn">News</button>
      <button class="btn" id="videosBtn">Videos</button>
      <button class="btn" id="mapsBtn">Maps</button>
    </div>
  </div>

  <div class="badges">
    <div class="no-ai-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      No AI Overview
    </div>
    <div class="no-ai-badge dim-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Bang shortcuts
    </div>
  </div>


  <p class="hint"><kbd>Enter</kbd> search &nbsp;&middot;&nbsp; <kbd>Esc</kbd> clear &nbsp;&middot;&nbsp; <kbd>⌘K</kbd> focus</p>

</main>

<footer>
  <span>zero tracking &middot; open source</span>
  <a href="https://github.com/MalahimHaseeb/no-ai-search" target="_blank" rel="noopener">github</a>
</footer>

<div class="kbd-hint" id="kbdHint">⌘K to focus</div>

<script src="main.js"></script>
</body>
</html>
